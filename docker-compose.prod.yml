# Local production-image smoke test.
#
# Builds the production Dockerfile and runs web + sidekiq containers from the
# same image, against ephemeral Postgres and Redis. Not for actual deployment.
#
#   cp .env.production.example .env.production   # then fill in secrets
#   docker compose -f docker-compose.prod.yml up --build
#
# Web:    http://localhost:8080
# Sidekiq web UI is mounted at /sidekiq in the app.

x-app: &app
  build:
    context: .
    dockerfile: Dockerfile
  image: qul:prod
  env_file:
    - .env.production
  environment:
    RAILS_ENV: production
    RAILS_LOG_TO_STDOUT: "true"
    RAILS_SERVE_STATIC_FILES: "true"
    REDIS_URL: redis://redis:6379/1
    QURAN_API_DB_HOST: db
    CMS_DB_HOST: db
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_started

services:
  web:
    <<: *app
    ports:
      - "8080:80"
    command: ["./bin/thrust", "./bin/rails", "server"]

  worker:
    <<: *app
    command: ["./bin/start-sidekiq"]

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: quran_community_tarteel
    volumes:
      - qul-prod-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    volumes:
      - qul-prod-redis:/data

volumes:
  qul-prod-postgres:
  qul-prod-redis:
